spring:
  datasource:
      url: jdbc:mysql://192.168.5.101:3306/seckill_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&autoReconnect=true
      username: hostonly_user
      password: 123456  # 改成你自己的数据库密码
      driver-class-name: com.mysql.cj.jdbc.Driver


  flyway:
    enabled: true
    baseline-on-migrate: true # 如果数据库有表但无flyway历史表，会自动创建基线
    locations: classpath:db/migration # 指定脚本位置

  # Redis 配置
  data:
      redis:
          host: 192.168.5.101
          port: 6379
          password: devlinda123456
          lettuce:
              pool:
                  max-active: 20
                  max-idle: 10
                  min-idle: 5
  rabbitmq:
      host: 192.168.5.101  # 你的虚拟机IP
      port: 5672
      username: admin
      password: 123456
      virtual-host: /
      listener:
            simple:
              acknowledge-mode: manual
              prefetch: 1

  profiles:
      active: dev

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发时打印SQL日志

management:
  endpoints:
    web:
      exposure:
        include: "*"           # 暴露所有端点（生产环境需按需开放）
      base-path: /actuator     # 默认路径，可自定义
  endpoint:
    health:
      show-details: always    # 健康检查显示详细信息
    metrics:
      enabled: true           # 开启指标端点
    prometheus:
      enabled: true           # 开启 Prometheus 格式输出
  metrics:
    export:
      prometheus:
        enabled: true

