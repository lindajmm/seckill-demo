spring:
  datasource:
      url: jdbc:mysql://192.168.5.101:3306/seckill_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&autoReconnect=true
      username: hostonly_user
      password: 123456  # 改成你自己的数据库密码
      driver-class-name: com.mysql.cj.jdbc.Driver


  flyway:
    enabled: true
    baseline-on-migrate: true # 如果数据库有表但无flyway历史表，会自动创建基线
    locations: classpath:db/migration # 指定脚本位置

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发时打印SQL日志

